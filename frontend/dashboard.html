<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Boni Womack · Stock Signal Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:        #080b0f;
    --surface:   #0e1318;
    --border:    #1c2530;
    --border2:   #253040;
    --muted:     #3a4a5a;
    --dim:       #5a6e82;
    --text:      #c8d8e8;
    --bright:    #e8f2fc;
    --buy:       #00e5a0;
    --buy-bg:    rgba(0,229,160,0.08);
    --sell:      #ff4e6a;
    --sell-bg:   rgba(255,78,106,0.08);
    --hold:      #f5c542;
    --hold-bg:   rgba(245,197,66,0.08);
    --accent:    #2196f3;
    --accent2:   #00bcd4;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Scanline texture overlay ─────────────────────────────────────────── */
  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 999;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
  }

  /* ── Header ────────────────────────────────────────────────────────────── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(33,150,243,0.04) 0%, transparent 100%);
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(12px);
  }

  .logo {
    display: flex; align-items: baseline; gap: 10px;
  }
  .logo-name {
    font-family: var(--font-head);
    font-size: 18px;
    font-weight: 800;
    color: var(--bright);
    letter-spacing: -0.5px;
  }
  .logo-tag {
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .header-right {
    display: flex; align-items: center; gap: 16px;
  }

  .live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--buy);
    box-shadow: 0 0 8px var(--buy);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .header-meta {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 1px;
  }

  /* ── Layout ─────────────────────────────────────────────────────────────── */
  .app { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 61px); }

  /* ── Sidebar ─────────────────────────────────────────────────────────────── */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 24px 0;
    display: flex; flex-direction: column; gap: 2px;
  }

  .sidebar-label {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); padding: 0 20px 8px;
  }

  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 20px;
    cursor: pointer;
    color: var(--dim);
    font-size: 12px;
    letter-spacing: 0.5px;
    transition: all 0.15s;
    border-left: 2px solid transparent;
    user-select: none;
  }
  .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
  .nav-item.active { color: var(--bright); border-left-color: var(--accent); background: rgba(33,150,243,0.06); }

  .nav-icon { font-size: 14px; width: 18px; text-align: center; }

  .sidebar-divider {
    height: 1px; background: var(--border); margin: 12px 20px;
  }

  /* Signal count badges in sidebar */
  .nav-badge {
    margin-left: auto;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 10px;
    font-weight: 600;
  }
  .badge-buy { background: var(--buy-bg); color: var(--buy); border: 1px solid rgba(0,229,160,0.2); }
  .badge-sell { background: var(--sell-bg); color: var(--sell); border: 1px solid rgba(255,78,106,0.2); }

  /* ── Main content ─────────────────────────────────────────────────────────── */
  main { padding: 28px 32px; overflow-y: auto; }

  /* ── Page title ──────────────────────────────────────────────────────────── */
  .page-header {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 24px;
    animation: fadeUp 0.4s ease both;
  }

  .page-title {
    font-family: var(--font-head);
    font-size: 26px; font-weight: 700;
    color: var(--bright);
    letter-spacing: -0.5px;
  }
  .page-subtitle {
    font-size: 12px; color: var(--dim);
    margin-top: 3px;
  }

  /* ── Stat cards row ──────────────────────────────────────────────────────── */
  .stats-row {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    animation: fadeUp 0.4s ease both;
    position: relative; overflow: hidden;
  }
  .stat-card::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.4;
  }
  .stat-card:nth-child(1) { animation-delay: 0.05s; }
  .stat-card:nth-child(2) { animation-delay: 0.1s; }
  .stat-card:nth-child(3) { animation-delay: 0.15s; }
  .stat-card:nth-child(4) { animation-delay: 0.2s; }

  .stat-label { font-size: 10px; color: var(--dim); letter-spacing: 1.5px; text-transform: uppercase; }
  .stat-value {
    font-family: var(--font-head);
    font-size: 28px; font-weight: 700; color: var(--bright);
    margin-top: 4px; letter-spacing: -1px;
  }
  .stat-value.buy { color: var(--buy); }
  .stat-value.sell { color: var(--sell); }
  .stat-value.hold { color: var(--hold); }

  /* ── Toolbar ─────────────────────────────────────────────────────────────── */
  .toolbar {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 16px;
    animation: fadeUp 0.4s 0.2s ease both;
  }

  .filter-group { display: flex; gap: 4px; }
  .filter-btn {
    padding: 6px 14px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--dim);
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active-buy  { border-color: var(--buy);  color: var(--buy);  background: var(--buy-bg); }
  .filter-btn.active-sell { border-color: var(--sell); color: var(--sell); background: var(--sell-bg); }
  .filter-btn.active-hold { border-color: var(--hold); color: var(--hold); background: var(--hold-bg); }
  .filter-btn.active-all  { border-color: var(--accent); color: var(--accent); background: rgba(33,150,243,0.08); }

  .search-box {
    flex: 1; max-width: 240px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 12px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }

  .sort-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    color: var(--dim);
    font-family: var(--font-mono);
    font-size: 11px;
    outline: none;
    cursor: pointer;
  }

  /* ── Table ───────────────────────────────────────────────────────────────── */
  .table-wrap {
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    animation: fadeUp 0.4s 0.25s ease both;
  }

  table { width: 100%; border-collapse: collapse; }

  thead tr {
    background: rgba(255,255,255,0.02);
    border-bottom: 1px solid var(--border);
  }

  th {
    padding: 10px 14px;
    text-align: left;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 400;
    white-space: nowrap;
  }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { color: var(--text); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.12s;
    cursor: pointer;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.025); }

  td { padding: 11px 14px; vertical-align: middle; }

  .ticker-cell {
    display: flex; align-items: center; gap: 10px;
  }
  .ticker-symbol {
    font-family: var(--font-head);
    font-size: 14px; font-weight: 700;
    color: var(--bright); letter-spacing: -0.3px;
  }
  .ticker-industry {
    font-size: 10px; color: var(--dim);
  }

  .score-bar-wrap {
    display: flex; align-items: center; gap: 8px;
  }
  .score-val {
    font-family: var(--font-head);
    font-size: 13px; font-weight: 700; min-width: 34px;
    color: var(--bright);
  }
  .score-bar {
    height: 4px; width: 80px; background: var(--border);
    border-radius: 2px; overflow: hidden;
  }
  .score-bar-fill {
    height: 100%; border-radius: 2px;
    transition: width 0.6s cubic-bezier(.16,1,.3,1);
  }

  .momentum-cell {
    font-family: var(--font-mono);
    font-size: 12px;
  }
  .momentum-cell.pos { color: var(--buy); }
  .momentum-cell.neg { color: var(--sell); }
  .momentum-cell.zero { color: var(--muted); }

  .rank-cell {
    font-size: 11px; color: var(--dim);
    font-family: var(--font-mono);
  }
  .rank-top { color: var(--buy); font-weight: 600; }

  .signal-pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px;
    border-radius: 3px;
    font-size: 10px; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase;
    font-family: var(--font-head);
  }
  .pill-BUY  { background: var(--buy-bg);  color: var(--buy);  border: 1px solid rgba(0,229,160,0.25); }
  .pill-SELL { background: var(--sell-bg); color: var(--sell); border: 1px solid rgba(255,78,106,0.25); }
  .pill-HOLD { background: var(--hold-bg); color: var(--hold); border: 1px solid rgba(245,197,66,0.25); }

  .coverage-cell { font-size: 11px; color: var(--muted); }

  /* ── Detail panel ─────────────────────────────────────────────────────────── */
  .detail-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(8,11,15,0.85);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.2s ease;
  }

  .detail-panel {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 12px;
    width: 520px; max-width: 95vw;
    padding: 32px;
    animation: slideUp 0.25s cubic-bezier(.16,1,.3,1);
    position: relative;
  }

  .detail-close {
    position: absolute; top: 16px; right: 16px;
    background: none; border: 1px solid var(--border);
    color: var(--dim); font-size: 14px;
    width: 28px; height: 28px;
    border-radius: 4px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .detail-close:hover { color: var(--text); border-color: var(--border2); }

  .detail-header { margin-bottom: 24px; }
  .detail-ticker {
    font-family: var(--font-head);
    font-size: 36px; font-weight: 800;
    color: var(--bright); letter-spacing: -1px;
    display: flex; align-items: center; gap: 12px;
  }
  .detail-industry { font-size: 12px; color: var(--dim); margin-top: 2px; }

  .detail-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;
    margin-bottom: 20px;
  }

  .detail-metric {
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
  }
  .detail-metric-label { font-size: 10px; color: var(--dim); letter-spacing: 1.5px; text-transform: uppercase; }
  .detail-metric-value {
    font-family: var(--font-head);
    font-size: 22px; font-weight: 700; color: var(--bright);
    margin-top: 2px;
  }

  .detail-explanation {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    font-size: 12px; color: var(--text); line-height: 1.7;
  }
  .detail-explanation-label {
    font-size: 10px; color: var(--dim); letter-spacing: 1.5px;
    text-transform: uppercase; margin-bottom: 8px;
  }

  /* ── Industries view ──────────────────────────────────────────────────────── */
  .industry-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
    animation: fadeUp 0.4s 0.2s ease both;
  }

  .industry-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    transition: border-color 0.15s, transform 0.15s;
    cursor: default;
  }
  .industry-card:hover { border-color: var(--border2); transform: translateY(-1px); }

  .industry-name {
    font-family: var(--font-head);
    font-size: 15px; font-weight: 700;
    color: var(--bright); margin-bottom: 12px;
  }

  .industry-stats {
    display: flex; gap: 14px; margin-bottom: 14px;
  }
  .ind-stat { flex: 1; }
  .ind-stat-val {
    font-family: var(--font-head);
    font-size: 20px; font-weight: 700; color: var(--bright);
  }
  .ind-stat-lbl { font-size: 10px; color: var(--dim); letter-spacing: 1px; text-transform: uppercase; }

  .industry-signals {
    display: flex; gap: 6px;
  }
  .ind-sig {
    flex: 1; text-align: center;
    padding: 5px 4px;
    border-radius: 4px;
    font-size: 11px; font-family: var(--font-head); font-weight: 700;
  }

  .industry-top {
    margin-top: 12px;
    font-size: 11px; color: var(--dim);
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }
  .industry-top span { color: var(--accent2); }

  /* ── Signals view ─────────────────────────────────────────────────────────── */
  .signals-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    animation: fadeUp 0.4s 0.2s ease both;
  }

  .signals-column-title {
    font-family: var(--font-head);
    font-size: 13px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    padding: 10px 16px 10px;
    border-radius: 6px 6px 0 0;
    margin-bottom: 0;
  }
  .signals-column-title.buy { color: var(--buy); background: var(--buy-bg); border: 1px solid rgba(0,229,160,0.15); }
  .signals-column-title.sell { color: var(--sell); background: var(--sell-bg); border: 1px solid rgba(255,78,106,0.15); }

  .signal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    padding: 14px 16px;
    transition: background 0.12s;
    cursor: pointer;
  }
  .signal-card:hover { background: rgba(255,255,255,0.025); }
  .signal-card:last-child { border-radius: 0 0 6px 6px; }

  .sc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .sc-ticker { font-family: var(--font-head); font-size: 16px; font-weight: 700; color: var(--bright); }
  .sc-score { font-size: 12px; font-family: var(--font-mono); }
  .sc-industry { font-size: 10px; color: var(--dim); }
  .sc-momentum { font-size: 11px; margin-top: 4px; }

  /* ── Empty state ─────────────────────────────────────────────────────────── */
  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--muted);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
  .empty-text { font-size: 13px; }

  /* ── Loading skeleton ─────────────────────────────────────────────────────── */
  .skeleton {
    background: linear-gradient(90deg, var(--border) 25%, var(--border2) 50%, var(--border) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 3px;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }

  /* ── Error ───────────────────────────────────────────────────────────────── */
  .error-bar {
    background: rgba(255,78,106,0.1);
    border: 1px solid rgba(255,78,106,0.3);
    border-radius: 6px;
    padding: 12px 16px; margin-bottom: 20px;
    color: var(--sell); font-size: 12px;
    display: flex; align-items: center; gap: 8px;
  }

  /* ── Refresh btn ─────────────────────────────────────────────────────────── */
  .refresh-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: transparent;
    color: var(--dim);
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    margin-left: auto;
  }
  .refresh-btn:hover { color: var(--text); border-color: var(--border2); }
  .refresh-btn.spinning span { animation: spin 0.8s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Keyframe animations ─────────────────────────────────────────────────── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0)    scale(1); }
  }

  .price-cell { font-family: var(--font-head); font-size: 13px; font-weight: 700; color: var(--bright); }
  .price-change { font-size: 10px; margin-top: 1px; }
  .price-change.pos { color: var(--buy); }
  .price-change.neg { color: var(--sell); }
  .price-change.zero { color: var(--muted); }
  .price-loading { color: var(--muted); font-size: 11px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-name">BONI WOMACK</span>
    <span class="logo-tag">Signal Engine</span>
  </div>
  <div class="header-right">
    <div class="live-dot"></div>
    <span class="header-meta" id="lastUpdate">LAST UPDATE: —</span>
  </div>
</header>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-label">Navigation</div>
    <div class="nav-item active" onclick="setView('stocks')" id="nav-stocks">
      <span class="nav-icon">▦</span> All Stocks
    </div>
    <div class="nav-item" onclick="setView('signals')" id="nav-signals">
      <span class="nav-icon">◎</span> Signals
      <span class="nav-badge badge-buy" id="buy-count-badge">—</span>
    </div>
    <div class="nav-item" onclick="setView('industries')" id="nav-industries">
      <span class="nav-icon">◈</span> Industries
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-label">Strategy</div>
    <div style="padding: 0 20px; font-size: 11px; color: var(--muted); line-height: 1.9;">
      <div><span style="color:var(--buy)">BUY</span>  score ≥ 4.0</div>
      <div style="padding-left:8px;color:var(--border2)">+ momentum > 0</div>
      <div style="padding-left:8px;color:var(--border2)">+ top 25%</div>
      <br/>
      <div><span style="color:var(--sell)">SELL</span> score ≤ 2.5</div>
      <div style="padding-left:8px;color:var(--border2)">+ momentum &lt; 0</div>
      <div style="padding-left:8px;color:var(--border2)">+ bottom 25%</div>
    </div>
  </aside>

  <!-- Main -->
  <main id="main-content">
    <div id="app-view"></div>
  </main>
</div>

<!-- Detail Modal -->
<div id="detail-overlay" class="detail-overlay" style="display:none" onclick="closeDetail(event)">
  <div class="detail-panel" id="detail-panel"></div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
// When served via FastAPI (/dashboard), use relative URLs.
// When opened as a local file, fall back to localhost:8000.
const API = window.location.protocol === 'file:' ? 'http://localhost:8000' : '';
let state = {
  view: 'stocks',
  stocks: [],
  industries: [],
  signals: [],
  prices: {},
  pricesLoading: false,
  loading: false,
  error: null,
  filter: 'ALL',
  search: '',
  sort: 'score',
  selected: null,
};

// ── Mock data (used when backend is not available) ─────────────────────────
function generateMockStocks() {
  const tickers = [
    ['NVDA','Information Technology'], ['AAPL','Information Technology'],
    ['MSFT','Information Technology'], ['AMD','Information Technology'],
    ['GOOGL','Communication Services'], ['META','Communication Services'],
    ['AMZN','Consumer Discretionary'], ['TSLA','Consumer Discretionary'],
    ['JPM','Financials'], ['GS','Financials'], ['V','Financials'],
    ['JNJ','Health Care'], ['LLY','Health Care'], ['UNH','Health Care'],
    ['XOM','Energy'], ['CVX','Energy'],
    ['BA','Industrials'], ['CAT','Industrials'],
    ['KO','Consumer Staples'], ['PG','Consumer Staples'],
  ];

  // Seeded pseudo-random
  const hash = s => s.split('').reduce((a,c)=>((a<<5)-a)+c.charCodeAt(0),0);

  const stocks = tickers.map(([ticker, industry]) => {
    const seed = Math.abs(hash(ticker));
    const rng = (min, max) => min + (((seed * 1103515245 + 12345) & 0x7fffffff) % 1000) / 1000 * (max - min);

    // Unique score per ticker
    const scores = {NVDA:4.7,AAPL:4.4,MSFT:4.5,AMD:4.2,GOOGL:4.3,META:4.1,
      AMZN:4.0,TSLA:3.2,JPM:3.8,GS:3.5,V:4.1,JNJ:3.3,LLY:4.6,UNH:3.9,
      XOM:3.1,CVX:2.8,BA:2.3,CAT:3.6,KO:3.4,PG:3.7};
    const momenta = {NVDA:0.42,AAPL:0.18,MSFT:0.25,AMD:0.31,GOOGL:0.14,META:0.08,
      AMZN:0.05,TSLA:-0.22,JPM:0.11,GS:-0.05,V:0.19,JNJ:-0.08,LLY:0.55,UNH:0.06,
      XOM:-0.15,CVX:-0.28,BA:-0.41,CAT:0.13,KO:0.02,PG:0.09};

    const score = scores[ticker] || 3.0;
    const momentum = momenta[ticker] || 0;

    // Rank within industry
    const industryStocks = tickers.filter(([,ind]) => ind === industry);
    const rank = industryStocks.sort(([a],[b]) => (scores[b]||3)-(scores[a]||3))
                               .findIndex(([t]) => t === ticker) + 1;
    const industry_size = industryStocks.length;

    // Boni Womack logic
    const top25 = rank / industry_size <= 0.25;
    const bot25 = rank / industry_size >= 0.75;
    let signal = 'HOLD';
    if (score >= 4.0 && momentum > 0 && top25) signal = 'BUY';
    else if (score <= 2.5 && momentum < 0 && bot25) signal = 'SELL';

    const explanation = signal === 'BUY'
      ? `${ticker} earns a BUY signal: consensus score of ${score.toFixed(2)} (≥4.0), positive 30-day momentum (+${momentum.toFixed(2)}), and ranks #${rank} of ${industry_size} in ${industry} (top 25%).`
      : signal === 'SELL'
      ? `${ticker} earns a SELL signal: weak score of ${score.toFixed(2)} (≤2.5), negative momentum (${momentum.toFixed(2)}), bottom of ${industry}.`
      : `${ticker} is rated HOLD. Score ${score.toFixed(2)}, momentum ${momentum >= 0 ? '+' : ''}${momentum.toFixed(2)}, rank #${rank}/${industry_size} in ${industry}.`;

    return { ticker, industry, score, momentum, rank, industry_size,
             coverage_count: 8 + (Math.abs(hash(ticker)) % 7),
             signal, explanation };
  });

  return stocks;
}

function generateMockIndustries(stocks) {
  const map = {};
  stocks.forEach(s => {
    if (!map[s.industry]) map[s.industry] = [];
    map[s.industry].push(s);
  });
  return Object.entries(map).map(([industry, ss]) => ({
    industry,
    stock_count: ss.length,
    avg_score: +(ss.reduce((a,b)=>a+b.score,0)/ss.length).toFixed(2),
    buy_count: ss.filter(s=>s.signal==='BUY').length,
    sell_count: ss.filter(s=>s.signal==='SELL').length,
    hold_count: ss.filter(s=>s.signal==='HOLD').length,
    top_ticker: ss.sort((a,b)=>b.score-a.score)[0].ticker,
  })).sort((a,b)=>b.avg_score-a.avg_score);
}

// ── Fetch with fallback ────────────────────────────────────────────────────
async function fetchData() {
  state.loading = true;
  state.error = null;
  render();

  try {
    const [stocksRes, industriesRes] = await Promise.all([
      fetch(`${API}/stocks`),
      fetch(`${API}/industries`),
    ]);
    if (!stocksRes.ok) throw new Error('API error');
    state.stocks = await stocksRes.json();
    state.industries = await industriesRes.json();
  } catch (e) {
    // Fallback to mock data
    state.stocks = generateMockStocks();
    state.industries = generateMockIndustries(state.stocks);
    state.error = 'Backend not connected · Showing demo data';
  }

  state.signals = state.stocks.filter(s => s.signal !== 'HOLD');
  document.getElementById('buy-count-badge').textContent =
    state.stocks.filter(s=>s.signal==='BUY').length;
  document.getElementById('lastUpdate').textContent =
    'LAST UPDATE: ' + new Date().toLocaleTimeString();
  state.loading = false;
  render();

  // Fetch live prices in the background (non-blocking)
  fetchPrices();
}

async function fetchPrices() {
  if (!state.stocks.length) return;
  state.pricesLoading = true;
  try {
    const tickers = state.stocks.map(s => s.ticker).join(',');
    const res = await fetch(`${API}/prices?tickers=${tickers}`);
    if (res.ok) {
      state.prices = await res.json();
      render(); // re-render with prices populated
    }
  } catch (e) {
    // Prices are optional — silently fail
  }
  state.pricesLoading = false;
}

// ── Navigation ─────────────────────────────────────────────────────────────
function setView(v) {
  state.view = v;
  ['stocks','signals','industries'].forEach(id => {
    document.getElementById(`nav-${id}`).classList.toggle('active', id === v);
  });
  render();
}

// ── Score bar color ────────────────────────────────────────────────────────
function scoreColor(score) {
  if (score >= 4.0) return 'var(--buy)';
  if (score <= 2.5) return 'var(--sell)';
  if (score >= 3.5) return 'var(--accent2)';
  return 'var(--hold)';
}

// ── Render helpers ─────────────────────────────────────────────────────────
function signalPill(signal) {
  return `<span class="signal-pill pill-${signal}">${signal}</span>`;
}

function momentumHTML(m) {
  const cls = m > 0 ? 'pos' : m < 0 ? 'neg' : 'zero';
  const arrow = m > 0 ? '▲' : m < 0 ? '▼' : '—';
  return `<span class="momentum-cell ${cls}">${arrow} ${Math.abs(m).toFixed(2)}</span>`;
}

// ── Detail modal ───────────────────────────────────────────────────────────
function openDetail(ticker) {
  const s = state.stocks.find(x => x.ticker === ticker);
  if (!s) return;
  state.selected = s;

  const panel = document.getElementById('detail-panel');
  panel.innerHTML = `
    <button class="detail-close" onclick="document.getElementById('detail-overlay').style.display='none'">✕</button>
    <div class="detail-header">
      <div class="detail-ticker">${s.ticker} ${signalPill(s.signal)}</div>
      <div class="detail-industry">${s.industry}</div>
    </div>
    <div class="detail-grid">
      <div class="detail-metric">
        <div class="detail-metric-label">Live Price</div>
        <div class="detail-metric-value" style="color:var(--bright)">${(()=>{const p=state.prices[s.ticker];if(!p)return '—';const col=p.change>0?'var(--buy)':p.change<0?'var(--sell)':'var(--muted)';return '$'+p.price.toLocaleString()+' <span style="font-size:13px;color:'+col+'">'+(p.change>=0?'+':'')+p.change_pct.toFixed(2)+'%</span>';})()}</div>
      </div>
      <div class="detail-metric">
        <div class="detail-metric-label">Consensus Score</div>
        <div class="detail-metric-value" style="color:${scoreColor(s.score)}">${s.score.toFixed(2)}</div>
      </div>
      <div class="detail-metric">
        <div class="detail-metric-label">Momentum (30d)</div>
        <div class="detail-metric-value" style="color:${s.momentum>0?'var(--buy)':s.momentum<0?'var(--sell)':'var(--muted)'}">${s.momentum>=0?'+':''}${s.momentum.toFixed(3)}</div>
      </div>
      <div class="detail-metric">
        <div class="detail-metric-label">Industry Rank</div>
        <div class="detail-metric-value">#${s.rank} <span style="font-size:14px;color:var(--dim)">/ ${s.industry_size}</span></div>
      </div>
      <div class="detail-metric">
        <div class="detail-metric-label">Coverage</div>
        <div class="detail-metric-value">${s.coverage_count} <span style="font-size:14px;color:var(--dim)">analysts</span></div>
      </div>
    </div>
    <div class="detail-explanation">
      <div class="detail-explanation-label">Signal Rationale</div>
      ${s.explanation}
    </div>
  `;
  document.getElementById('detail-overlay').style.display = 'flex';
}

function closeDetail(e) {
  if (e.target === document.getElementById('detail-overlay'))
    document.getElementById('detail-overlay').style.display = 'none';
}

// ── Views ──────────────────────────────────────────────────────────────────
function renderStocksView() {
  let filtered = [...state.stocks];
  if (state.filter !== 'ALL') filtered = filtered.filter(s => s.signal === state.filter);
  if (state.search) {
    const q = state.search.toLowerCase();
    filtered = filtered.filter(s =>
      s.ticker.toLowerCase().includes(q) ||
      s.industry.toLowerCase().includes(q)
    );
  }
  if (state.sort === 'score')    filtered.sort((a,b) => b.score - a.score);
  if (state.sort === 'momentum') filtered.sort((a,b) => b.momentum - a.momentum);
  if (state.sort === 'rank')     filtered.sort((a,b) => a.rank - b.rank);

  const buyCnt  = state.stocks.filter(s=>s.signal==='BUY').length;
  const sellCnt = state.stocks.filter(s=>s.signal==='SELL').length;
  const holdCnt = state.stocks.filter(s=>s.signal==='HOLD').length;
  const avgScore = state.stocks.length
    ? (state.stocks.reduce((a,b)=>a+b.score,0)/state.stocks.length).toFixed(2) : '—';

  return `
    <div class="page-header">
      <div>
        <div class="page-title">Stock Universe</div>
        <div class="page-subtitle">${state.stocks.length} tickers tracked · Boni Womack strategy active</div>
      </div>
      <button class="refresh-btn ${state.loading?'spinning':''}" onclick="fetchData()">
        <span>↻</span> Refresh
      </button>
    </div>
    ${state.error ? `<div class="error-bar">⚠ ${state.error}</div>` : ''}
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Total Stocks</div><div class="stat-value">${state.stocks.length}</div></div>
      <div class="stat-card"><div class="stat-label">BUY Signals</div><div class="stat-value buy">${buyCnt}</div></div>
      <div class="stat-card"><div class="stat-label">SELL Signals</div><div class="stat-value sell">${sellCnt}</div></div>
      <div class="stat-card"><div class="stat-label">Avg Score</div><div class="stat-value">${avgScore}</div></div>
    </div>
    <div class="toolbar">
      <div class="filter-group">
        ${['ALL','BUY','SELL','HOLD'].map(f=>`
          <button class="filter-btn ${state.filter===f?'active-'+f.toLowerCase():''}"
            onclick="state.filter='${f}';render()">${f}</button>
        `).join('')}
      </div>
      <input class="search-box" placeholder="Search ticker / industry…"
        value="${state.search}"
        oninput="state.search=this.value;render()" />
      <select class="sort-select" onchange="state.sort=this.value;render()">
        <option value="score" ${state.sort==='score'?'selected':''}>Sort: Score</option>
        <option value="momentum" ${state.sort==='momentum'?'selected':''}>Sort: Momentum</option>
        <option value="rank" ${state.sort==='rank'?'selected':''}>Sort: Rank</option>
      </select>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Ticker</th>
          <th>Price</th>
          <th>Score</th>
          <th>Momentum</th>
          <th>Rank</th>
          <th>Coverage</th>
          <th>Signal</th>
        </tr></thead>
        <tbody>
          ${filtered.length === 0
            ? `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">◎</div><div class="empty-text">No stocks match the current filter.</div></div></td></tr>`
            : filtered.map(s => `
              <tr onclick="openDetail('${s.ticker}')">
                <td>
                  <div class="ticker-cell">
                    <div>
                      <div class="ticker-symbol">${s.ticker}</div>
                      <div class="ticker-industry">${s.industry}</div>
                    </div>
                  </div>
                </td>
                <td>${(() => {
                  const p = state.prices[s.ticker];
                  if (state.pricesLoading && !p) return '<span class="price-loading">loading…</span>';
                  if (!p) return '<span class="price-loading">—</span>';
                  const cls = p.change > 0 ? 'pos' : p.change < 0 ? 'neg' : 'zero';
                  const arrow = p.change > 0 ? '▲' : p.change < 0 ? '▼' : '';
                  return `<div class="price-cell">$${p.price.toLocaleString()}</div><div class="price-change ${cls}">${arrow} ${Math.abs(p.change_pct).toFixed(2)}%</div>`;
                })()}</td>
                <td>
                  <div class="score-bar-wrap">
                    <span class="score-val" style="color:${scoreColor(s.score)}">${s.score.toFixed(2)}</span>
                    <div class="score-bar">
                      <div class="score-bar-fill" style="width:${(s.score/5)*100}%;background:${scoreColor(s.score)}"></div>
                    </div>
                  </div>
                </td>
                <td>${momentumHTML(s.momentum)}</td>
                <td><span class="rank-cell ${s.rank===1?'rank-top':''}">#${s.rank}/${s.industry_size}</span></td>
                <td><span class="coverage-cell">${s.coverage_count} analysts</span></td>
                <td>${signalPill(s.signal)}</td>
              </tr>
            `).join('')
          }
        </tbody>
      </table>
    </div>
  `;
}

function renderSignalsView() {
  const buys  = state.stocks.filter(s=>s.signal==='BUY').sort((a,b)=>b.score-a.score);
  const sells = state.stocks.filter(s=>s.signal==='SELL').sort((a,b)=>a.score-b.score);

  const signalCard = (s) => `
    <div class="signal-card" onclick="openDetail('${s.ticker}')">
      <div class="sc-top">
        <span class="sc-ticker">${s.ticker}</span>
        <span class="sc-score" style="color:${scoreColor(s.score)}">${s.score.toFixed(2)}</span>
      </div>
      <div class="sc-industry">${s.industry}</div>
      <div class="sc-momentum">${momentumHTML(s.momentum)}</div>
    </div>
  `;

  return `
    <div class="page-header">
      <div>
        <div class="page-title">Active Signals</div>
        <div class="page-subtitle">${buys.length} buy signals · ${sells.length} sell signals</div>
      </div>
    </div>
    ${state.error ? `<div class="error-bar">⚠ ${state.error}</div>` : ''}
    <div class="signals-grid">
      <div>
        <div class="signals-column-title buy">▲ BUY &nbsp; (${buys.length})</div>
        ${buys.length ? buys.map(signalCard).join('') : `<div class="signal-card" style="color:var(--muted);text-align:center;padding:24px">No buy signals</div>`}
      </div>
      <div>
        <div class="signals-column-title sell">▼ SELL &nbsp; (${sells.length})</div>
        ${sells.length ? sells.map(signalCard).join('') : `<div class="signal-card" style="color:var(--muted);text-align:center;padding:24px">No sell signals</div>`}
      </div>
    </div>
  `;
}

function renderIndustriesView() {
  return `
    <div class="page-header">
      <div>
        <div class="page-title">Industries</div>
        <div class="page-subtitle">${state.industries.length} GICS sectors · sorted by avg score</div>
      </div>
    </div>
    ${state.error ? `<div class="error-bar">⚠ ${state.error}</div>` : ''}
    <div class="industry-grid">
      ${state.industries.map(ind => `
        <div class="industry-card">
          <div class="industry-name">${ind.industry}</div>
          <div class="industry-stats">
            <div class="ind-stat">
              <div class="ind-stat-val" style="color:${scoreColor(ind.avg_score)}">${ind.avg_score.toFixed(2)}</div>
              <div class="ind-stat-lbl">Avg Score</div>
            </div>
            <div class="ind-stat">
              <div class="ind-stat-val">${ind.stock_count}</div>
              <div class="ind-stat-lbl">Stocks</div>
            </div>
          </div>
          <div class="industry-signals">
            <div class="ind-sig pill-BUY">${ind.buy_count} BUY</div>
            <div class="ind-sig pill-HOLD">${ind.hold_count} HOLD</div>
            <div class="ind-sig pill-SELL">${ind.sell_count} SELL</div>
          </div>
          <div class="industry-top">Top pick: <span>${ind.top_ticker || '—'}</span></div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderLoading() {
  return `
    <div class="page-header">
      <div>
        <div class="page-title">Loading…</div>
        <div class="page-subtitle">Fetching market data</div>
      </div>
    </div>
    <div class="stats-row">
      ${[1,2,3,4].map(()=>`<div class="stat-card"><div class="skeleton" style="height:12px;width:60%;margin-bottom:8px"></div><div class="skeleton" style="height:28px;width:40%"></div></div>`).join('')}
    </div>
    <div class="table-wrap" style="padding:20px">
      ${[1,2,3,4,5].map(()=>`<div class="skeleton" style="height:44px;margin-bottom:8px;border-radius:4px"></div>`).join('')}
    </div>
  `;
}

// ── Main render ────────────────────────────────────────────────────────────
function render() {
  const view = document.getElementById('app-view');
  if (state.loading) { view.innerHTML = renderLoading(); return; }
  if (state.view === 'stocks')     view.innerHTML = renderStocksView();
  else if (state.view === 'signals')    view.innerHTML = renderSignalsView();
  else if (state.view === 'industries') view.innerHTML = renderIndustriesView();
}

// ── Boot ───────────────────────────────────────────────────────────────────
fetchData();
</script>
</body>
</html>
