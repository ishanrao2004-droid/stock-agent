<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Boni Womack · Stock Signal Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:        #080b0f;
    --surface:   #0e1318;
    --border:    #1c2530;
    --border2:   #253040;
    --muted:     #3a4a5a;
    --dim:       #5a6e82;
    --text:      #c8d8e8;
    --bright:    #e8f2fc;
    --buy:       #00e5a0;
    --buy-bg:    rgba(0,229,160,0.08);
    --sell:      #ff4e6a;
    --sell-bg:   rgba(255,78,106,0.08);
    --hold:      #f5c542;
    --hold-bg:   rgba(245,197,66,0.08);
    --accent:    #2196f3;
    --accent2:   #00bcd4;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Scanline texture overlay ─────────────────────────────────────────── */
  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 999;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
  }

  /* ── Header ────────────────────────────────────────────────────────────── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(33,150,243,0.04) 0%, transparent 100%);
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(12px);
  }

  .logo {
    display: flex; align-items: baseline; gap: 10px;
  }
  .logo-name {
    font-family: var(--font-head);
    font-size: 18px;
    font-weight: 800;
    color: var(--bright);
    letter-spacing: -0.5px;
  }
  .logo-tag {
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .header-right {
    display: flex; align-items: center; gap: 16px;
  }

  .live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--buy);
    box-shadow: 0 0 8px var(--buy);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .header-meta {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 1px;
  }

  /* ── Layout ─────────────────────────────────────────────────────────────── */
  .app { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 61px); }

  /* ── Sidebar ─────────────────────────────────────────────────────────────── */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 24px 0;
    display: flex; flex-direction: column; gap: 2px;
  }

  .sidebar-label {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); padding: 0 20px 8px;
  }

  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 20px;
    cursor: pointer;
    color: var(--dim);
    font-size: 12px;
    letter-spacing: 0.5px;
    transition: all 0.15s;
    border-left: 2px solid transparent;
    user-select: none;
  }
  .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
  .nav-item.active { color: var(--bright); border-left-color: var(--accent); background: rgba(33,150,243,0.06); }

  .nav-icon { font-size: 14px; width: 18px; text-align: center; }

  .sidebar-divider {
    height: 1px; background: var(--border); margin: 12px 20px;
  }

  /* Signal count badges in sidebar */
  .nav-badge {
    margin-left: auto;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 10px;
    font-weight: 600;
  }
  .badge-buy { background: var(--buy-bg); color: var(--buy); border: 1px solid rgba(0,229,160,0.2); }
  .badge-sell { background: var(--sell-bg); color: var(--sell); border: 1px solid rgba(255,78,106,0.2); }

  /* ── Main content ─────────────────────────────────────────────────────────── */
  main { padding: 28px 32px; overflow-y: auto; }

  /* ── Page title ──────────────────────────────────────────────────────────── */
  .page-header {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 24px;
    animation: fadeUp 0.4s ease both;
  }

  .page-title {
    font-family: var(--font-head);
    font-size: 26px; font-weight: 700;
    color: var(--bright);
    letter-spacing: -0.5px;
  }
  .page-subtitle {
    font-size: 12px; color: var(--dim);
    margin-top: 3px;
  }

  /* ── Stat cards row ──────────────────────────────────────────────────────── */
  .stats-row {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    animation: fadeUp 0.4s ease both;
    position: relative; overflow: hidden;
  }
  .stat-card::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.4;
  }
  .stat-card:nth-child(1) { animation-delay: 0.05s; }
  .stat-card:nth-child(2) { animation-delay: 0.1s; }
  .stat-card:nth-child(3) { animation-delay: 0.15s; }
  .stat-card:nth-child(4) { animation-delay: 0.2s; }

  .stat-label { font-size: 10px; color: var(--dim); letter-spacing: 1.5px; text-transform: uppercase; }
  .stat-value {
    font-family: var(--font-head);
    font-size: 28px; font-weight: 700; color: var(--bright);
    margin-top: 4px; letter-spacing: -1px;
  }
  .stat-value.buy { color: var(--buy); }
  .stat-value.sell { color: var(--sell); }
  .stat-value.hold { color: var(--hold); }

  /* ── Toolbar ─────────────────────────────────────────────────────────────── */
  .toolbar {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 16px;
    animation: fadeUp 0.4s 0.2s ease both;
  }

  .filter-group { display: flex; gap: 4px; }
  .filter-btn {
    padding: 6px 14px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--dim);
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active-buy  { border-color: var(--buy);  color: var(--buy);  background: var(--buy-bg); }
  .filter-btn.active-sell { border-color: var(--sell); color: var(--sell); background: var(--sell-bg); }
  .filter-btn.active-hold { border-color: var(--hold); color: var(--hold); background: var(--hold-bg); }
  .filter-btn.active-all  { border-color: var(--accent); color: var(--accent); background: rgba(33,150,243,0.08); }

  .search-box {
    flex: 1; max-width: 240px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 12px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }

  .sort-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    color: var(--dim);
    font-family: var(--font-mono);
    font-size: 11px;
    outline: none;
    cursor: pointer;
  }

  /* ── Table ───────────────────────────────────────────────────────────────── */
  .table-wrap {
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    animation: fadeUp 0.4s 0.25s ease both;
  }

  table { width: 100%; border-collapse: collapse; }

  thead tr {
    background: rgba(255,255,255,0.02);
    border-bottom: 1px solid var(--border);
  }

  th {
    padding: 10px 14px;
    text-align: left;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 400;
    white-space: nowrap;
  }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { color: var(--text); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.12s;
    cursor: pointer;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.025); }

  td { padding: 11px 14px; vertical-align: middle; }

  .ticker-cell {
    display: flex; align-items: center; gap: 10px;
  }
  .ticker-symbol {
    font-family: var(--font-head);
    font-size: 14px; font-weight: 700;
    color: var(--bright); letter-spacing: -0.3px;
  }
  .ticker-industry {
    font-size: 10px; color: var(--dim);
  }

  .score-bar-wrap {
    display: flex; align-items: center; gap: 8px;
  }
  .score-val {
    font-family: var(--font-head);
    font-size: 13px; font-weight: 700; min-width: 34px;
    color: var(--bright);
  }
  .score-bar {
    height: 4px; width: 80px; background: var(--border);
    border-radius: 2px; overflow: hidden;
  }
  .score-bar-fill {
    height: 100%; border-radius: 2px;
    transition: width 0.6s cubic-bezier(.16,1,.3,1);
  }

  .momentum-cell {
    font-family: var(--font-mono);
    font-size: 12px;
  }
  .momentum-cell.pos { color: var(--buy); }
  .momentum-cell.neg { color: var(--sell); }
  .momentum-cell.zero { color: var(--muted); }

  .rank-cell {
    font-size: 11px; color: var(--dim);
    font-family: var(--font-mono);
  }
  .rank-top { color: var(--buy); font-weight: 600; }

  .signal-pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px;
    border-radius: 3px;
    font-size: 10px; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase;
    font-family: var(--font-head);
  }
  .pill-BUY  { background: var(--buy-bg);  color: var(--buy);  border: 1px solid rgba(0,229,160,0.25); }
  .pill-SELL { background: var(--sell-bg); color: var(--sell); border: 1px solid rgba(255,78,106,0.25); }
  .pill-HOLD { background: var(--hold-bg); color: var(--hold); border: 1px solid rgba(245,197,66,0.25); }

  .coverage-cell { font-size: 11px; color: var(--muted); }

  /* ── Detail panel ─────────────────────────────────────────────────────────── */
  .detail-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(8,11,15,0.85);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.2s ease;
  }

  .detail-panel {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 12px;
    width: 520px; max-width: 95vw;
    padding: 32px;
    animation: slideUp 0.25s cubic-bezier(.16,1,.3,1);
    position: relative;
  }

  .detail-close {
    position: absolute; top: 16px; right: 16px;
    background: none; border: 1px solid var(--border);
    color: var(--dim); font-size: 14px;
    width: 28px; height: 28px;
    border-radius: 4px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .detail-close:hover { color: var(--text); border-color: var(--border2); }

  .detail-header { margin-bottom: 24px; }
  .detail-ticker {
    font-family: var(--font-head);
    font-size: 36px; font-weight: 800;
    color: var(--bright); letter-spacing: -1px;
    display: flex; align-items: center; gap: 12px;
  }
  .detail-industry { font-size: 12px; color: var(--dim); margin-top: 2px; }

  .detail-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;
    margin-bottom: 20px;
  }

  .detail-metric {
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
  }
  .detail-metric-label { font-size: 10px; color: var(--dim); letter-spacing: 1.5px; text-transform: uppercase; }
  .detail-metric-value {
    font-family: var(--font-head);
    font-size: 22px; font-weight: 700; color: var(--bright);
    margin-top: 2px;
  }

  .detail-explanation {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    font-size: 12px; color: var(--text); line-height: 1.7;
  }
  .detail-explanation-label {
    font-size: 10px; color: var(--dim); letter-spacing: 1.5px;
    text-transform: uppercase; margin-bottom: 8px;
  }

  /* ── Industries view ──────────────────────────────────────────────────────── */
  .industry-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
    animation: fadeUp 0.4s 0.2s ease both;
  }

  .industry-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    transition: border-color 0.15s, transform 0.15s;
    cursor: default;
  }
  .industry-card:hover { border-color: var(--border2); transform: translateY(-1px); }

  .industry-name {
    font-family: var(--font-head);
    font-size: 15px; font-weight: 700;
    color: var(--bright); margin-bottom: 12px;
  }

  .industry-stats {
    display: flex; gap: 14px; margin-bottom: 14px;
  }
  .ind-stat { flex: 1; }
  .ind-stat-val {
    font-family: var(--font-head);
    font-size: 20px; font-weight: 700; color: var(--bright);
  }
  .ind-stat-lbl { font-size: 10px; color: var(--dim); letter-spacing: 1px; text-transform: uppercase; }

  .industry-signals {
    display: flex; gap: 6px;
  }
  .ind-sig {
    flex: 1; text-align: center;
    padding: 5px 4px;
    border-radius: 4px;
    font-size: 11px; font-family: var(--font-head); font-weight: 700;
  }

  .industry-top {
    margin-top: 12px;
    font-size: 11px; color: var(--dim);
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }
  .industry-top span { color: var(--accent2); }

  /* ── Signals view ─────────────────────────────────────────────────────────── */
  .signals-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    animation: fadeUp 0.4s 0.2s ease both;
  }

  .signals-column-title {
    font-family: var(--font-head);
    font-size: 13px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    padding: 10px 16px 10px;
    border-radius: 6px 6px 0 0;
    margin-bottom: 0;
  }
  .signals-column-title.buy { color: var(--buy); background: var(--buy-bg); border: 1px solid rgba(0,229,160,0.15); }
  .signals-column-title.sell { color: var(--sell); background: var(--sell-bg); border: 1px solid rgba(255,78,106,0.15); }

  .signal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    padding: 14px 16px;
    transition: background 0.12s;
    cursor: pointer;
  }
  .signal-card:hover { background: rgba(255,255,255,0.025); }
  .signal-card:last-child { border-radius: 0 0 6px 6px; }

  .sc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .sc-ticker { font-family: var(--font-head); font-size: 16px; font-weight: 700; color: var(--bright); }
  .sc-score { font-size: 12px; font-family: var(--font-mono); }
  .sc-industry { font-size: 10px; color: var(--dim); }
  .sc-momentum { font-size: 11px; margin-top: 4px; }

  /* ── Empty state ─────────────────────────────────────────────────────────── */
  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--muted);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
  .empty-text { font-size: 13px; }

  /* ── Loading skeleton ─────────────────────────────────────────────────────── */
  .skeleton {
    background: linear-gradient(90deg, var(--border) 25%, var(--border2) 50%, var(--border) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 3px;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }

  /* ── Error ───────────────────────────────────────────────────────────────── */
  .error-bar {
    background: rgba(255,78,106,0.1);
    border: 1px solid rgba(255,78,106,0.3);
    border-radius: 6px;
    padding: 12px 16px; margin-bottom: 20px;
    color: var(--sell); font-size: 12px;
    display: flex; align-items: center; gap: 8px;
  }

  /* ── Refresh btn ─────────────────────────────────────────────────────────── */
  .refresh-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: transparent;
    color: var(--dim);
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    margin-left: auto;
  }
  .refresh-btn:hover { color: var(--text); border-color: var(--border2); }
  .refresh-btn.spinning span { animation: spin 0.8s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Keyframe animations ─────────────────────────────────────────────────── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0)    scale(1); }
  }

  .price-cell { font-family: var(--font-head); font-size: 13px; font-weight: 700; color: var(--bright); }
  .price-change { font-size: 10px; margin-top: 1px; }
  .price-change.pos { color: var(--buy); }
  .price-change.neg { color: var(--sell); }
  .price-change.zero { color: var(--muted); }
  .price-loading { color: var(--muted); font-size: 11px; }

  .portfolio-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; animation: fadeUp 0.4s 0.2s ease both; }
  .portfolio-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
  .portfolio-card-title { font-family: var(--font-head); font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .portfolio-card-title.long { color: var(--buy); }
  .portfolio-card-title.short { color: var(--sell); }
  .portfolio-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .portfolio-row:last-child { border-bottom: none; }
  .portfolio-ticker { font-family: var(--font-head); font-weight: 700; color: var(--bright); font-size: 13px; min-width: 60px; }
  .portfolio-weight { color: var(--dim); font-size: 11px; }
  .portfolio-price { font-family: var(--font-mono); color: var(--text); }
  .portfolio-change.pos { color: var(--buy); }
  .portfolio-change.neg { color: var(--sell); }
  .summary-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; animation: fadeUp 0.4s 0.1s ease both; }
  .summary-row { display: flex; gap: 0; }
  .summary-stat { flex: 1; padding: 0 16px; border-right: 1px solid var(--border); }
  .summary-stat:first-child { padding-left: 0; }
  .summary-stat:last-child { border-right: none; }
  .summary-val { font-family: var(--font-head); font-size: 22px; font-weight: 700; color: var(--bright); }
  .summary-lbl { font-size: 10px; color: var(--dim); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px; }
  .methodology-box { background: rgba(33,150,243,0.05); border: 1px solid rgba(33,150,243,0.15); border-radius: 8px; padding: 16px 20px; font-size: 11.5px; color: var(--dim); line-height: 1.8; animation: fadeUp 0.4s 0.3s ease both; }
  .methodology-box strong { color: var(--text); }

  .bt-chart { width:100%; height:240px; background:var(--surface); border:1px solid var(--border); border-radius:8px; margin-bottom:20px; position:relative; overflow:hidden; }
  .bt-canvas { position:absolute; inset:0; }
  .bt-stat-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:20px; animation:fadeUp 0.4s 0.1s ease both; }
  .bt-stat { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:14px 16px; }
  .bt-stat-val { font-family:var(--font-head); font-size:20px; font-weight:700; }
  .bt-stat-lbl { font-size:10px; color:var(--dim); letter-spacing:1.2px; text-transform:uppercase; margin-top:3px; }
  .bt-table { border:1px solid var(--border); border-radius:8px; overflow:hidden; animation:fadeUp 0.4s 0.2s ease both; }

  .opt-toggle-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}

<body>

<header>
  <div class="logo">
    <span class="logo-name">BONI WOMACK</span>
    <span class="logo-tag">Signal Engine</span>
  </div>
  <div class="header-right">
    <div class="live-dot"></div>
    <span class="header-meta" id="lastUpdate">LAST UPDATE: —</span>
  </div>
</header>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-label">Navigation</div>
    <div class="nav-item active" onclick="setView('stocks')" id="nav-stocks">
      <span class="nav-icon">▦</span> All Stocks
    </div>
    <div class="nav-item" onclick="setView('signals')" id="nav-signals">
      <span class="nav-icon">◎</span> Signals
      <span class="nav-badge badge-buy" id="buy-count-badge">—</span>
    </div>
    <div class="nav-item" onclick="setView('industries')" id="nav-industries">
      <span class="nav-icon">◈</span> Industries
    </div>
    <div class="nav-item" onclick="setView('portfolio')" id="nav-portfolio">
      <span class="nav-icon">◬</span> Portfolio
    </div>
    <div class="nav-item" onclick="setView('backtest')" id="nav-backtest">
      <span class="nav-icon">⏱</span> Backtest
    </div>
    <div class="nav-item" onclick="setView('neutral')" id="nav-neutral">
      <span class="nav-icon">⊕</span> Mkt Neutral
    </div>
    <div class="nav-item" onclick="setView('optimizer')" id="nav-optimizer">
      <span class="nav-icon">◐</span> Optimizer
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-label">Strategy</div>
    <div style="padding: 0 20px; font-size: 11px; color: var(--muted); line-height: 1.9;">
      <div><span style="color:var(--buy)">BUY</span>  score ≥ 4.0</div>
      <div style="padding-left:8px;color:var(--border2)">+ momentum > 0</div>
      <div style="padding-left:8px;color:var(--border2)">+ top 25%</div>
      <br/>
      <div><span style="color:var(--sell)">SELL</span> score ≤ 2.5</div>
      <div style="padding-left:8px;color:var(--border2)">+ momentum &lt; 0</div>
      <div style="padding-left:8px;color:var(--border2)">+ bottom 25%</div>
    </div>
  </aside>

  <!-- Main -->
  <main id="main-content">
    <div id="app-view"></div>
  </main>
</div>

<!-- Detail Modal -->
<div id="detail-overlay" class="detail-overlay" style="display:none" onclick="closeDetail(event)">
  <div class="detail-panel" id="detail-panel"></div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
// When served via FastAPI (/dashboard), use relative URLs.
// When opened as a local file, fall back to localhost:8000.
const API = window.location.protocol === 'file:' ? 'http://localhost:8000' : '';
let state = {
  view: 'stocks',
  stocks: [],
  industries: [],
  signals: [],
  prices: {},
  pricesLoading: false,
  loading: false,
  error: null,
  filter: 'ALL',
  search: '',
  sort: 'score',
  selected: null,
  // Portfolio position tracking — persisted in sessionStorage
  // { ticker: { signal: 'BUY'|'SELL', entryDate: ISO string, entryPrice: number } }
  positions: {},
  // Benchmark & performance tracking
  spyPrice: null,          // current SPY price
  spyBaselinePrice: null,  // SPY price when portfolio was first initialized
  portfolioBaseline: null, // portfolio snapshot price when first initialized
  portfolioReturn: null,   // current gross portfolio return %
  spyReturn: null,         // SPY return over same period %
};

// ── Mock data (used when backend is not available) ─────────────────────────
function generateMockStocks() {
  const tickers = [
    ['NVDA','Information Technology'], ['AAPL','Information Technology'],
    ['MSFT','Information Technology'], ['AMD','Information Technology'],
    ['GOOGL','Communication Services'], ['META','Communication Services'],
    ['AMZN','Consumer Discretionary'], ['TSLA','Consumer Discretionary'],
    ['JPM','Financials'], ['GS','Financials'], ['V','Financials'],
    ['JNJ','Health Care'], ['LLY','Health Care'], ['UNH','Health Care'],
    ['XOM','Energy'], ['CVX','Energy'],
    ['BA','Industrials'], ['CAT','Industrials'],
    ['KO','Consumer Staples'], ['PG','Consumer Staples'],
  ];

  // Seeded pseudo-random
  const hash = s => s.split('').reduce((a,c)=>((a<<5)-a)+c.charCodeAt(0),0);

  const stocks = tickers.map(([ticker, industry]) => {
    const seed = Math.abs(hash(ticker));
    const rng = (min, max) => min + (((seed * 1103515245 + 12345) & 0x7fffffff) % 1000) / 1000 * (max - min);

    // Unique score per ticker
    const scores = {NVDA:4.7,AAPL:4.4,MSFT:4.5,AMD:4.2,GOOGL:4.3,META:4.1,
      AMZN:4.0,TSLA:3.2,JPM:3.8,GS:3.5,V:4.1,JNJ:3.3,LLY:4.6,UNH:3.9,
      XOM:3.1,CVX:2.8,BA:2.3,CAT:3.6,KO:3.4,PG:3.7};
    const momenta = {NVDA:0.42,AAPL:0.18,MSFT:0.25,AMD:0.31,GOOGL:0.14,META:0.08,
      AMZN:0.05,TSLA:-0.22,JPM:0.11,GS:-0.05,V:0.19,JNJ:-0.08,LLY:0.55,UNH:0.06,
      XOM:-0.15,CVX:-0.28,BA:-0.41,CAT:0.13,KO:0.02,PG:0.09};

    const score = scores[ticker] || 3.0;
    const momentum = momenta[ticker] || 0;

    // Rank within industry
    const industryStocks = tickers.filter(([,ind]) => ind === industry);
    const rank = industryStocks.sort(([a],[b]) => (scores[b]||3)-(scores[a]||3))
                               .findIndex(([t]) => t === ticker) + 1;
    const industry_size = industryStocks.length;

    // Boni Womack logic
    const top25 = rank / industry_size <= 0.25;
    const bot25 = rank / industry_size >= 0.75;
    let signal = 'HOLD';
    if (score >= 4.0 && momentum > 0 && top25) signal = 'BUY';
    else if (score <= 2.5 && momentum < 0 && bot25) signal = 'SELL';

    const explanation = signal === 'BUY'
      ? `${ticker} earns a BUY signal: consensus score of ${score.toFixed(2)} (≥4.0), positive 30-day momentum (+${momentum.toFixed(2)}), and ranks #${rank} of ${industry_size} in ${industry} (top 25%).`
      : signal === 'SELL'
      ? `${ticker} earns a SELL signal: weak score of ${score.toFixed(2)} (≤2.5), negative momentum (${momentum.toFixed(2)}), bottom of ${industry}.`
      : `${ticker} is rated HOLD. Score ${score.toFixed(2)}, momentum ${momentum >= 0 ? '+' : ''}${momentum.toFixed(2)}, rank #${rank}/${industry_size} in ${industry}.`;

    return { ticker, industry, score, momentum, rank, industry_size,
             coverage_count: 8 + (Math.abs(hash(ticker)) % 7),
             signal, explanation };
  });

  return stocks;
}

function generateMockIndustries(stocks) {
  const map = {};
  stocks.forEach(s => {
    if (!map[s.industry]) map[s.industry] = [];
    map[s.industry].push(s);
  });
  return Object.entries(map).map(([industry, ss]) => ({
    industry,
    stock_count: ss.length,
    avg_score: +(ss.reduce((a,b)=>a+b.score,0)/ss.length).toFixed(2),
    buy_count: ss.filter(s=>s.signal==='BUY').length,
    sell_count: ss.filter(s=>s.signal==='SELL').length,
    hold_count: ss.filter(s=>s.signal==='HOLD').length,
    top_ticker: ss.sort((a,b)=>b.score-a.score)[0].ticker,
  })).sort((a,b)=>b.avg_score-a.avg_score);
}

// ── Fetch with fallback ────────────────────────────────────────────────────
async function fetchData() {
  state.loading = true;
  state.error = null;
  render();

  try {
    const [stocksRes, industriesRes] = await Promise.all([
      fetch(`${API}/stocks`),
      fetch(`${API}/industries`),
    ]);
    if (!stocksRes.ok) throw new Error('API error');
    state.stocks = await stocksRes.json();
    state.industries = await industriesRes.json();
  } catch (e) {
    // Fallback to mock data
    state.stocks = generateMockStocks();
    state.industries = generateMockIndustries(state.stocks);
    state.error = 'Backend not connected · Showing demo data';
  }

  state.signals = state.stocks.filter(s => s.signal !== 'HOLD');
  document.getElementById('buy-count-badge').textContent =
    state.stocks.filter(s=>s.signal==='BUY').length;
  document.getElementById('lastUpdate').textContent =
    'LAST UPDATE: ' + new Date().toLocaleTimeString();
  state.loading = false;
  reconcilePositions(); // reconcile even before prices load
  render();

  // Fetch live prices in the background (non-blocking)
  fetchPrices();
}

async function fetchPrices() {
  if (!state.stocks.length) return;
  state.pricesLoading = true;
  try {
    // Include SPY in the main price fetch so benchmark is always available
    const allTickers = ['SPY', ...state.stocks.map(s => s.ticker)].join(',');
    const res = await fetch(`${API}/prices?tickers=${allTickers}`);
    if (res.ok) {
      state.prices = await res.json();
    }
  } catch (e) {
    // Prices are optional — silently fail
  }
  state.pricesLoading = false;
  reconcilePositions(); // update position tracking with latest signals + prices

  // Backfill entryPrice for any positions that were created before prices loaded
  let backfilled = false;
  Object.entries(state.positions).forEach(([ticker, pos]) => {
    if (pos.active && !pos.entryPrice && state.prices[ticker]) {
      pos.entryPrice = state.prices[ticker].price;
      backfilled = true;
    }
  });
  if (backfilled) {
    try { sessionStorage.setItem('portfolio_positions', JSON.stringify(state.positions)); } catch(e) {}
  }

  // Set SPY baseline from prices already loaded (SPY included in main fetch)
  if (state.prices['SPY']) {
    const spyData = state.prices['SPY'];
    state.spyPrice = spyData.price;
    if (!state.spyBaselinePrice) {
      const saved = sessionStorage.getItem('spy_inception_price');
      if (saved) {
        state.spyBaselinePrice = parseFloat(saved);
      } else {
        state.spyBaselinePrice = spyData.price;
        sessionStorage.setItem('spy_inception_price', String(state.spyBaselinePrice));
        sessionStorage.setItem('spy_inception_date', new Date().toISOString().slice(0, 10));
      }
    }
    state.spyReturn = ((state.spyPrice - state.spyBaselinePrice) / state.spyBaselinePrice) * 100;
  }

  computePortfolioReturn(); // calculate gross portfolio return
  render(); // single render once prices are done
}

// ── Fetch SPY benchmark price ──────────────────────────────────────────────
async function fetchSPY() {
  try {
    const res = await fetch(`${API}/prices?tickers=SPY`);
    if (res.ok) {
      const data = await res.json();
      if (data.SPY) {
        state.spyPrice = data.SPY.price;

        // Baseline SPY to the price when this session started
        // sessionStorage persists through refreshes but resets when tab is closed
        if (!state.spyBaselinePrice) {
          const saved = sessionStorage.getItem('spy_inception_price');
          if (saved) {
            state.spyBaselinePrice = parseFloat(saved);
          } else {
            // First load this session — record current price as the starting point
            state.spyBaselinePrice = data.SPY.price;
            sessionStorage.setItem('spy_inception_price', String(state.spyBaselinePrice));
            sessionStorage.setItem('spy_inception_date', new Date().toISOString().slice(0, 10));
          }
        }

        state.spyReturn = ((state.spyPrice - state.spyBaselinePrice) / state.spyBaselinePrice) * 100;
        render();
      }
    }
  } catch(e) {}
}

// ── Compute gross portfolio return ─────────────────────────────────────────
// Equal-weighted average of individual position P&Ls
// Longs: profit when price rises. Shorts: profit when price falls.
function computePortfolioReturn() {
  const active = Object.entries(state.positions).filter(([, p]) => p.active);
  if (!active.length) { state.portfolioReturn = null; return; }

  let totalReturn = 0;
  let counted = 0;
  active.forEach(([ticker, pos]) => {
    const p = state.prices[ticker];
    if (!p) return;
    let ret;
    if (pos.entryPrice && pos.entryPrice > 0) {
      // Use actual inception entry price for true cumulative P&L
      ret = pos.signal === 'BUY'
        ? (p.price - pos.entryPrice) / pos.entryPrice * 100
        : (pos.entryPrice - p.price) / pos.entryPrice * 100;
    } else {
      // Entry price not yet loaded — use today's change as proxy
      ret = pos.signal === 'BUY' ? p.change_pct : -p.change_pct;
    }
    totalReturn += ret;
    counted++;
  });

  state.portfolioReturn = counted > 0 ? totalReturn / counted : null;
}

// ── Portfolio position reconciliation ─────────────────────────────────────
// Called after every data refresh. Adds new BUY/SELL signals to positions,
// removes positions whose signal has changed or disappeared (exited).
// Stores positions in sessionStorage so they survive page refreshes.
function reconcilePositions() {
  // Load persisted positions from sessionStorage
  try {
    const saved = localStorage.getItem('portfolio_positions');
    if (saved) state.positions = JSON.parse(saved);
  } catch(e) {}

  const now = new Date().toISOString();
  const currentSignals = {};
  state.stocks.forEach(s => { currentSignals[s.ticker] = s.signal; });

  // 1. Remove positions where signal has changed or stock no longer qualifies
  Object.keys(state.positions).forEach(ticker => {
    const pos = state.positions[ticker];
    const currentSignal = currentSignals[ticker];
    if (currentSignal !== pos.signal) {
      // Signal changed — exit position, log it
      pos.exitDate = now;
      pos.exitSignal = currentSignal || 'NONE';
      pos.active = false;
    }
  });

  // 2. Add new positions for stocks that now have BUY or SELL signals
  state.stocks.forEach(s => {
    if (s.signal === 'HOLD') return;
    const existing = state.positions[s.ticker];
    if (!existing || !existing.active) {
      // New position or re-entry after signal flip
      const price = state.prices[s.ticker];
      state.positions[s.ticker] = {
        signal: s.signal,
        entryDate: now,
        entryPrice: price ? price.price : null,
        active: true,
        score: s.score,
        industry: s.industry,
      };
    }
  });

  // 3. Persist to localStorage so inception prices survive browser close/reopen
  try {
    localStorage.setItem('portfolio_positions', JSON.stringify(state.positions));
  } catch(e) {}
}

// ── Navigation ─────────────────────────────────────────────────────────────
function setView(v) {
  state.view = v;
  ['stocks','signals','industries','portfolio','backtest','neutral','optimizer'].forEach(id => {
    document.getElementById(`nav-${id}`).classList.toggle('active', id === v);
  });
  render();
}

// ── Score bar color ────────────────────────────────────────────────────────
function scoreColor(score) {
  if (score >= 4.0) return 'var(--buy)';
  if (score <= 2.5) return 'var(--sell)';
  if (score >= 3.5) return 'var(--accent2)';
  return 'var(--hold)';
}

// ── Render helpers ─────────────────────────────────────────────────────────
function signalPill(signal) {
  return `<span class="signal-pill pill-${signal}">${signal}</span>`;
}

function momentumHTML(m) {
  const cls = m > 0 ? 'pos' : m < 0 ? 'neg' : 'zero';
  const arrow = m > 0 ? '▲' : m < 0 ? '▼' : '—';
  return `<span class="momentum-cell ${cls}">${arrow} ${Math.abs(m).toFixed(2)}</span>`;
}

// ── Detail modal ───────────────────────────────────────────────────────────
function openDetail(ticker) {
  const s = state.stocks.find(x => x.ticker === ticker);
  if (!s) return;
  state.selected = s;

  const panel = document.getElementById('detail-panel');
  panel.innerHTML = `
    <button class="detail-close" onclick="document.getElementById('detail-overlay').style.display='none'">✕</button>
    <div class="detail-header">
      <div class="detail-ticker">${s.ticker} ${signalPill(s.signal)}</div>
      <div class="detail-industry">${s.industry}</div>
    </div>
    <div class="detail-grid">
      <div class="detail-metric">
        <div class="detail-metric-label">Live Price</div>
        <div class="detail-metric-value" style="color:var(--bright)">${(()=>{const p=state.prices[s.ticker];if(!p)return '—';const col=p.change>0?'var(--buy)':p.change<0?'var(--sell)':'var(--muted)';return '$'+p.price.toLocaleString()+' <span style="font-size:13px;color:'+col+'">'+(p.change>=0?'+':'')+p.change_pct.toFixed(2)+'%</span>';})()}</div>
      </div>
      <div class="detail-metric">
        <div class="detail-metric-label">Consensus Score</div>
        <div class="detail-metric-value" style="color:${scoreColor(s.score)}">${s.score.toFixed(2)}</div>
      </div>
      <div class="detail-metric">
        <div class="detail-metric-label">Momentum (30d)</div>
        <div class="detail-metric-value" style="color:${s.momentum>0?'var(--buy)':s.momentum<0?'var(--sell)':'var(--muted)'}">${s.momentum>=0?'+':''}${s.momentum.toFixed(3)}</div>
      </div>
      <div class="detail-metric">
        <div class="detail-metric-label">Industry Rank</div>
        <div class="detail-metric-value">#${s.rank} <span style="font-size:14px;color:var(--dim)">/ ${s.industry_size}</span></div>
      </div>
      <div class="detail-metric">
        <div class="detail-metric-label">Coverage</div>
        <div class="detail-metric-value">${s.coverage_count} <span style="font-size:14px;color:var(--dim)">analysts</span></div>
      </div>
    </div>
    <div class="detail-explanation">
      <div class="detail-explanation-label">Signal Rationale</div>
      ${s.explanation}
    </div>
  `;
  document.getElementById('detail-overlay').style.display = 'flex';
}

function closeDetail(e) {
  if (e.target === document.getElementById('detail-overlay'))
    document.getElementById('detail-overlay').style.display = 'none';
}

// ── Views ──────────────────────────────────────────────────────────────────
function renderStocksView() {
  let filtered = [...state.stocks];
  if (state.filter !== 'ALL') filtered = filtered.filter(s => s.signal === state.filter);
  if (state.search) {
    const q = state.search.toLowerCase();
    filtered = filtered.filter(s =>
      s.ticker.toLowerCase().includes(q) ||
      s.industry.toLowerCase().includes(q)
    );
  }

function daysSince(isoDate) {
  if (!isoDate) return null;
  const diff = Date.now() - new Date(isoDate).getTime();
  return Math.floor(diff / 86400000);
}

function pnlCell(pos, currentPrice, side) {
  if (!pos.entryPrice || !currentPrice) return '<span style="color:var(--muted);font-size:10px">—</span>';
  let pnlPct;
  if (side === 'long') {
    pnlPct = ((currentPrice - pos.entryPrice) / pos.entryPrice) * 100;
  } else {
    // Short: profit when price falls
    pnlPct = ((pos.entryPrice - currentPrice) / pos.entryPrice) * 100;
  }
  const col = pnlPct >= 0 ? 'var(--buy)' : 'var(--sell)';
  const sign = pnlPct >= 0 ? '+' : '';
  return `<span style="color:${col};font-size:10px;font-weight:600">${sign}${pnlPct.toFixed(2)}%</span>`;
}

// ── Backtest state ─────────────────────────────────────────────────────────
let btState = { loading: false, data: null, error: null, days: 60 };

async function runBacktest(days) {
  btState.loading = true;
  btState.error = null;
  btState.days = days || btState.days;
  render();
  try {
    const res = await fetch(`${API}/backtest?days=${btState.days}`);
    if (!res.ok) throw new Error('API error');
    btState.data = await res.json();
    if (btState.data.error) throw new Error(btState.data.error);
  } catch(e) {
    btState.error = e.message || 'Backtest failed — Yahoo Finance may be blocking requests from the server.';
    btState.data = null;
  }
  btState.loading = false;
  render();
}

function drawChart(canvasId, portCurve, spyCurve) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width  = canvas.offsetWidth;
  const H = canvas.height = canvas.offsetHeight;

  const allVals = [...portCurve, ...spyCurve].map(d => d.value);
  const minV = Math.min(...allVals) * 0.998;
  const maxV = Math.max(...allVals) * 1.002;
  const pad  = { t: 20, r: 16, b: 30, l: 52 };
  const cW   = W - pad.l - pad.r;
  const cH   = H - pad.t - pad.b;

  const toX = i => pad.l + (i / (portCurve.length - 1)) * cW;
  const toY = v => pad.t + cH - ((v - minV) / (maxV - minV)) * cH;

  // Background
  ctx.fillStyle = '#0e1318';
  ctx.fillRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = '#1c2530';
  ctx.lineWidth = 0.5;
  for (let g = 0; g <= 4; g++) {
    const y = pad.t + (g / 4) * cH;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
    const val = maxV - (g / 4) * (maxV - minV);
    ctx.fillStyle = '#3a4a5a';
    ctx.font = '9px DM Mono, monospace';
    ctx.textAlign = 'right';
    ctx.fillText(val.toFixed(1), pad.l - 4, y + 3);
  }

  // Zero line (100)
  const zeroY = toY(100);
  ctx.strokeStyle = '#253040';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(pad.l, zeroY); ctx.lineTo(W - pad.r, zeroY); ctx.stroke();
  ctx.setLineDash([]);

  function drawLine(curve, color, glowColor) {
    // Glow
    ctx.shadowColor = glowColor;
    ctx.shadowBlur = 8;
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    curve.forEach((d, i) => {
      const x = toX(i), y = toY(d.value);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  drawLine(spyCurve,  '#5a6e82', '#5a6e82');
  drawLine(portCurve, portCurve[portCurve.length-1].value >= 100 ? '#00e5a0' : '#ff4e6a',
           portCurve[portCurve.length-1].value >= 100 ? '#00e5a0' : '#ff4e6a');

  // X-axis date labels
  ctx.fillStyle = '#3a4a5a';
  ctx.font = '9px DM Mono, monospace';
  ctx.textAlign = 'center';
  ctx.shadowBlur = 0;
  const labelStep = Math.ceil(portCurve.length / 6);
  portCurve.forEach((d, i) => {
    if (i % labelStep === 0 || i === portCurve.length - 1) {
      ctx.fillText(d.date.slice(5), toX(i), H - 8);
    }
  });

  // Legend
  ctx.font = '10px DM Mono, monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = portCurve[portCurve.length-1].value >= 100 ? '#00e5a0' : '#ff4e6a';
  ctx.fillText('● Portfolio', pad.l + 4, pad.t + 14);
  ctx.fillStyle = '#5a6e82';
  ctx.fillText('● SPY', pad.l + 80, pad.t + 14);
}

function renderBacktestView() {
  if (!btState.data && !btState.loading && !btState.error) {
    // Auto-trigger on first view
    setTimeout(() => runBacktest(60), 100);
  }

  const dayBtns = [30, 60, 90].map(d =>
    `<button onclick="runBacktest(${d})" style="padding:6px 14px;border-radius:4px;border:1px solid ${btState.days===d?'var(--accent)':'var(--border)'};background:${btState.days===d?'rgba(33,150,243,0.1)':'transparent'};color:${btState.days===d?'var(--accent)':'var(--dim)'};font-family:var(--font-mono);font-size:11px;cursor:pointer;margin-right:6px">${d}d</button>`
  ).join('');

  let body = '';

// ── Market Neutral Portfolio ───────────────────────────────────────────────
// Beta-neutral construction: weights each position by 1/beta so the
// weighted-average beta of longs equals the weighted-average beta of shorts.
// Dollar neutral: total long notional = total short notional.
// Sector neutral: no sector exceeds 20% of either book.

// Mock beta values — in production fetch from /prices endpoint
// (Yahoo Finance returns beta in the quote response)
const BETA_MAP = {
  NVDA:2.1, AMD:1.9, META:1.4, TSLA:2.0, AMZN:1.3, GOOGL:1.1, MSFT:0.9,
  AAPL:1.2, PLTR:1.8, CRWD:1.6, PANW:1.5, SNOW:1.7, CRM:1.3, NOW:1.2,
  INTU:1.1, ADBE:1.2, QCOM:1.1, TXN:1.0, INTC:0.9, ORCL:0.9, IBM:0.7,
  JPM:1.1, BAC:1.2, GS:1.3, MS:1.3, V:1.0, MA:1.1, C:1.2, AXP:1.1,
  COF:1.2, SCHW:1.2, BLK:1.1, WFC:1.1, PNC:1.0, USB:0.9, TFC:1.0,
  JNJ:0.6, UNH:0.8, LLY:0.5, ABBV:0.6, MRK:0.6, PFE:0.6, TMO:0.9,
  ABT:0.8, DHR:0.9, BMY:0.6, AMGN:0.7, GILD:0.6, BIIB:0.8, REGN:0.5,
  VRTX:0.6, ISRG:1.1, SYK:1.0, BSX:1.1, MDT:0.8, CVS:0.7, CI:0.8,
  XOM:1.0, CVX:1.0, COP:1.1, SLB:1.2, EOG:1.1, OXY:1.2, HAL:1.3,
  BA:1.3, CAT:1.1, GE:1.2, HON:0.9, UPS:0.9, RTX:0.9, LMT:0.7,
  NOC:0.7, DE:1.0, MMM:0.9, PG:0.6, KO:0.6, PEP:0.6, WMT:0.6,
  COST:0.9, MO:0.7, NEE:0.7, DUK:0.4, SO:0.4, LIN:0.8, APD:0.9,
  SPG:1.3, AMT:0.9, EQIX:0.9, DLR:0.8, PSA:0.8, VICI:0.9,
};

function getBeta(ticker) {
  return BETA_MAP[ticker] || 1.0; // default beta of 1.0 if unknown
}

function buildNeutralPortfolio() {
  const longs  = state.stocks.filter(s => s.signal === 'BUY');
  const shorts = state.stocks.filter(s => s.signal === 'SELL');

  // Step 1: Conviction score per stock (same as before)
  function conviction(s) {
    return s.position_weight > 0 ? s.position_weight : (1 / (longs.length + shorts.length));
  }

  // Step 2: Beta-adjust each position weight → raw_weight = conviction / beta
  function betaAdjustedWeights(stocks) {
    const raw = stocks.map(s => ({ ...s, rawW: conviction(s) / getBeta(s.ticker) }));
    const total = raw.reduce((a, b) => a + b.rawW, 0);
    return raw.map(s => ({ ...s, weight: total > 0 ? s.rawW / total : 1 / stocks.length }));
  }

  const longWeighted  = betaAdjustedWeights(longs);
  const shortWeighted = betaAdjustedWeights(shorts);

  // Step 3: Sector cap — no sector > 20% of either book
  function applySectorCap(weighted, cap=0.20) {
    const sectorTotals = {};
    weighted.forEach(s => {
      sectorTotals[s.industry] = (sectorTotals[s.industry] || 0) + s.weight;
    });
    // Scale down over-weight sectors
    const adjusted = weighted.map(s => {
      const sectorW = sectorTotals[s.industry];
      const scale = sectorW > cap ? cap / sectorW : 1.0;
      return { ...s, weight: s.weight * scale };
    });
    // Re-normalize
    const total = adjusted.reduce((a, b) => a + b.weight, 0);
    return adjusted.map(s => ({ ...s, weight: total > 0 ? s.weight / total : 0 }));
  }

  const longFinal  = applySectorCap(longWeighted);
  const shortFinal = applySectorCap(shortWeighted);

  // Step 4: Compute portfolio betas
  const longBeta  = longFinal.reduce((a, s)  => a + s.weight * getBeta(s.ticker), 0);
  const shortBeta = shortFinal.reduce((a, s) => a + s.weight * getBeta(s.ticker), 0);
  const netBeta   = longBeta - shortBeta;

  return { longFinal, shortFinal, longBeta, shortBeta, netBeta };
}

function renderNeutralView() {
  const { longFinal, shortFinal, longBeta, shortBeta, netBeta } = buildNeutralPortfolio();

  function posRows(stocks, side) {
    if (!stocks.length) return '<div style="color:var(--muted);padding:12px 0;font-size:12px">No positions</div>';

      const p = state.prices[s.ticker];
      const priceStr = p ? `$${p.price.toLocaleString()}` : '—';
      const chg = p ? `<span style="color:${p.change_pct>=0?'var(--buy)':'var(--sell)'};font-size:10px">${p.change_pct>=0?'+':''}${p.change_pct?.toFixed(2)}%</span>` : '';
      const beta = getBeta(s.ticker);
      const barW = Math.round(s.weight * 80);
      return `
        <div class="portfolio-row" onclick="openDetail('${s.ticker}')" style="cursor:pointer">
          <span class="portfolio-ticker">${s.ticker}</span>
          <span style="font-size:10px;color:var(--dim);flex:1;padding:0 6px">${s.industry.split(' ')[0]}</span>
          <span style="font-size:10px;color:var(--dim);margin-right:8px">β ${beta.toFixed(1)}</span>
          <span style="display:flex;align-items:center;gap:4px;margin-right:10px">
            <span style="font-size:10px;color:var(--accent);min-width:38px">${(s.weight*100).toFixed(1)}%</span>
            <div style="height:3px;width:${barW}px;background:var(--accent);border-radius:2px;opacity:0.5"></div>
          </span>
          <span style="font-size:12px;color:var(--text)">${priceStr}</span>
          <span style="margin-left:8px">${chg}</span>
        </div>`;
    }).join('');
  }

  const betaCol = Math.abs(netBeta) < 0.10 ? 'var(--buy)' : Math.abs(netBeta) < 0.25 ? 'var(--hold)' : 'var(--sell)';

  return `
    <div class="page-header">
      <div>
        <div class="page-title">Market Neutral</div>
        <div class="page-subtitle">Beta-neutral · Dollar-neutral · Sector-capped at 20%</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px;animation:fadeUp 0.4s ease both">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px">
        <div style="font-size:9px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase">Net Beta</div>
        <div style="font-family:var(--font-head);font-size:22px;font-weight:700;color:${betaCol}">${netBeta>=0?'+':''}${netBeta.toFixed(3)}</div>

      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px">
        <div style="font-size:9px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase">Long Beta</div>
        <div style="font-family:var(--font-head);font-size:22px;font-weight:700;color:var(--buy)">${longBeta.toFixed(3)}</div>
        <div style="font-size:9px;color:var(--dim);margin-top:2px">${longFinal.length} positions</div>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px">
        <div style="font-size:9px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase">Short Beta</div>
        <div style="font-family:var(--font-head);font-size:22px;font-weight:700;color:var(--sell)">${shortBeta.toFixed(3)}</div>
        <div style="font-size:9px;color:var(--dim);margin-top:2px">${shortFinal.length} positions</div>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px">
        <div style="font-size:9px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase">Sector Cap</div>
        <div style="font-family:var(--font-head);font-size:22px;font-weight:700;color:var(--accent)">20%</div>
        <div style="font-size:9px;color:var(--dim);margin-top:2px">per GICS sector</div>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px">
        <div style="font-size:9px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase">Dollar Neutral</div>
        <div style="font-family:var(--font-head);font-size:22px;font-weight:700;color:var(--buy)">✓</div>
        <div style="font-size:9px;color:var(--dim);margin-top:2px">long = short notional</div>
      </div>
    </div>

    <div style="background:rgba(33,150,243,0.05);border:1px solid rgba(33,150,243,0.15);border-radius:8px;padding:12px 16px;font-size:11px;color:var(--dim);margin-bottom:18px;line-height:1.8">
      <strong style="color:var(--text)">Beta-neutral weighting:</strong> Each position's weight = conviction score ÷ beta, then normalized within each book.
      High-beta stocks get smaller allocations so the book's weighted-average beta matches the other side. &nbsp;·&nbsp;
      <strong style="color:var(--text)">Sector cap:</strong> No single GICS sector exceeds 20% of either the long or short book. &nbsp;·&nbsp;
      <strong style="color:var(--text)">Beta values</strong> shown are estimates — connect Finnhub API for live betas.
    </div>

    <div class="portfolio-grid">
      <div class="portfolio-card">
        <div class="portfolio-card-title long">▲ Long Book — ${longFinal.length} positions · β-weighted</div>
        <div style="display:grid;grid-template-columns:60px 1fr 50px 80px 70px 60px;gap:0;padding:4px 0 6px;border-bottom:1px solid var(--border);margin-bottom:2px">
          <span style="font-size:9px;color:var(--muted)">TICKER</span>
          <span style="font-size:9px;color:var(--muted)">SECTOR</span>
          <span style="font-size:9px;color:var(--muted)">BETA</span>
          <span style="font-size:9px;color:var(--muted)">WEIGHT</span>
          <span style="font-size:9px;color:var(--muted)">PRICE</span>
          <span style="font-size:9px;color:var(--muted)">CHG</span>
        </div>
        ${posRows(longFinal, 'long')}
      </div>
      <div class="portfolio-card">
        <div class="portfolio-card-title short">▼ Short Book — ${shortFinal.length} positions · β-weighted</div>
        <div style="display:grid;grid-template-columns:60px 1fr 50px 80px 70px 60px;gap:0;padding:4px 0 6px;border-bottom:1px solid var(--border);margin-bottom:2px">
          <span style="font-size:9px;color:var(--muted)">TICKER</span>
          <span style="font-size:9px;color:var(--muted)">SECTOR</span>
          <span style="font-size:9px;color:var(--muted)">BETA</span>
          <span style="font-size:9px;color:var(--muted)">WEIGHT</span>
          <span style="font-size:9px;color:var(--muted)">PRICE</span>
          <span style="font-size:9px;color:var(--muted)">CHG</span>
        </div>
        ${posRows(shortFinal, 'short')}
      </div>
    </div>
  `;
}

// After render, draw chart if backtest data is available
const _origRender = render;
function render() {
  const view = document.getElementById('app-view');
  if (state.loading) { view.innerHTML = renderLoading(); return; }
  if (state.view === 'stocks')          view.innerHTML = renderStocksView();
  else if (state.view === 'signals')    view.innerHTML = renderSignalsView();
  else if (state.view === 'industries') view.innerHTML = renderIndustriesView();
  else if (state.view === 'portfolio')  view.innerHTML = renderPortfolioView();
  else if (state.view === 'backtest')   view.innerHTML = renderBacktestView();
  else if (state.view === 'neutral')    view.innerHTML = renderNeutralView();
  else if (state.view === 'optimizer')  view.innerHTML = renderOptimizerView();

  // Draw chart after DOM update
  if (state.view === 'backtest' && btState.data) {
    requestAnimationFrame(() => {
      drawChart('bt-canvas', btState.data.equity_curve, btState.data.spy_curve);
    });
  }
}

fetchData();
